---
name: Build and Release
on:
  push:
    branches:
      - main
  workflow_dispatch:
      inputs:
        release:
          description: "Run release (manual trigger)"
          type: boolean
          required: false
          default: true

permissions:
  contents: write
  packages: write

jobs:     
  build:
    if: (github.event_name == 'workflow_dispatch' && (inputs.release == true || inputs.release == 'true')) || contains(github.event.head_commit.message || '', '[Release]')
    name: Build GoBDS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"

      - name: Build Windows executable
        run: GOOS=windows GOARCH=amd64 go build -o gobds.exe ./main.go

      - name: Build Linux executable
        run: GOOS=linux GOARCH=amd64 go build -o gobds-linux ./main.go

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./gobds.exe
            ./gobds-linux

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
